<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="Ai7dio">
        <button type="submit">Login</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            console.log('Trying to login with:', username, password);

            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });

                const data = await response.json();

                console.log('Response:', response.status, data);

                if (response.ok) {
                    document.getElementById('result').innerHTML = `<p style="color: green;">Login successful! Token: ${data.access_token}</p>`;
                    localStorage.setItem('auth_token', data.access_token);
                } else {
                    document.getElementById('result').innerHTML = `<p style="color: red;">Login failed: ${data.detail}</p>`;
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('result').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
