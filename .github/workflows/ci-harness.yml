name: ci-harness

on:
  pull_request:
  workflow_dispatch:

jobs:
  harness:
    runs-on: ubuntu-latest
    env:
      HARNESS_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
      HARNESS_PROVIDER_MODE: mock
      HARNESS_WEB_PORT: 3100
      HARNESS_API_PORT: 8100
      HARNESS_NGINX_PORT: 9100
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: "npm"
          cache-dependency-path: ai-pic-frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-pic-backend/requirements.txt -r ai-pic-backend/requirements-test.txt

      - name: Install frontend dependencies
        working-directory: ai-pic-frontend
        run: npm ci

      - name: Compute changed files
        id: changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="$(git rev-parse HEAD^ || git rev-parse HEAD)"
          fi
          CHANGED="$(git diff --name-only "$BASE" HEAD | tr '\n' ' ')"
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Check repo docs
        run: python scripts/check_repo_docs.py

      - name: Check repo contracts
        run: python scripts/check_repo_contracts.py --mode diff --report-json "$RUNNER_TEMP/contracts-report.json" --report-md "$RUNNER_TEMP/contracts-summary.md" ${{ steps.changed.outputs.files }}

      - name: Backend quick regression
        working-directory: ai-pic-backend
        run: python run_tests.py quick

      - name: Frontend lint
        working-directory: ai-pic-frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: ai-pic-frontend
        run: npm run test

      - name: Bootstrap lite harness
        run: |
          chmod +x scripts/harness/bootstrap_worktree.sh
          scripts/harness/bootstrap_worktree.sh --mode lite

      - name: Doctor
        run: python scripts/harness/doctor.py --run-id "$HARNESS_RUN_ID" --nginx-url "http://localhost:$HARNESS_NGINX_PORT" --api-url "http://localhost:$HARNESS_API_PORT" --frontend-url "http://localhost:$HARNESS_WEB_PORT"

      - name: Golden path mock smoke
        run: python scripts/harness/run_golden_path.py --scenario mock_smoke --run-id "$HARNESS_RUN_ID" --base-url "http://localhost:$HARNESS_NGINX_PORT" --api-url "http://localhost:$HARNESS_API_PORT"

      - name: Trace run
        run: python scripts/harness/trace_run.py --run-id "$HARNESS_RUN_ID"

      - name: Score quality snapshot
        run: python scripts/harness/score_quality.py --run-id "$HARNESS_RUN_ID" --contract-report "$RUNNER_TEMP/contracts-report.json"
