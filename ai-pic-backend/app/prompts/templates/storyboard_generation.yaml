name: storyboard_generation
description: "分镜生成提示词模板"
category: storyboard
version: "2.0"
author: "AI Video Studio"
created_at: "2025-12-10"
updated_at: "2025-12-19"

variables:
  frames_per_scene:
    type: number
    required: true
    description: "每个场景的分镜数量"
  max_frames:
    type: number
    required: false
    description: "最大分镜数量"
  context_text:
    type: string
    required: true
    description: "剧本上下文摘要"
  style_preferences:
    type: list
    required: false
    description: "风格偏好"
  additional_requirements:
    type: string
    required: false
    description: "额外要求"

usage_examples:
  - frames_per_scene: 3
    max_frames: 18
    context_text: "场景1: 夜色下的旧仓库..."
    style_preferences: ["写实", "电影感"]
    additional_requirements: "突出光影对比"
