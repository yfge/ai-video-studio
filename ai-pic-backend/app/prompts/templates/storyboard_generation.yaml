name: storyboard_generation
description: "分镜生成提示词模板"
category: storyboard
version: "1.0"
author: "AI Video Studio"
created_at: "2025-12-10"
updated_at: "2025-12-10"

variables:
  scene:
    type: dict
    required: true
    description: "场景信息（scene_number/location/time/description等）"

  characters:
    type: list
    required: false
    description: "出场角色列表"

  dialogue:
    type: string
    required: false
    description: "相关对白或旁白"

usage_examples:
  - scene:
      scene_number: 3
      location: "旧仓库"
      time: "夜"
      description: "主角潜入仓库寻找线索"
    characters:
      - name: "阿强"
        description: "冷静的侦探"
    dialogue: "阿强：就是这里，真相近在眼前。"
