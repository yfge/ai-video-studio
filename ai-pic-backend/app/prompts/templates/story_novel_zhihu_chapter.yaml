description: Zhihu novel chapter prompt (must include summary markers)
category: story
version: "1.0"
variables:
  story:
    required: true
    type: dict
  plan:
    required: true
    type: dict
  ledger:
    required: true
    type: dict
  previous_tail:
    required: true
    type: string
  previous_cliffhanger:
