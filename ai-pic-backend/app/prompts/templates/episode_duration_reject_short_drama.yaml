name: episode_duration_reject_short_drama
description: "时长不符合要求的 REACT 驳回重生成（短剧）"
category: episode
version: "1.0"
author: "AI Video Studio"
created_at: "2026-01-18"
updated_at: "2026-01-18"

variables:
  story:
    type: dict
    required: true
    description: "故事信息对象"
  outline:
    type: dict
    required: true
    description: "单集 Step Outline（含 logline，beats 可选）"
  previous_episodes:
    type: list
    required: false
    description: "已生成的前序集列表（episode_number/title/logline）"
  rejected_episode:
    type: dict
    required: true
    description: "被驳回的 episode 版本"
  target_duration_seconds:
    type: number
    required: true
    description: "目标时长（秒）"
  current_duration_seconds:
    type: number
    required: true
    description: "当前预估时长（秒）"
  rejection_reason:
    type: string
    required: true
    description: "驳回原因 duration_too_short/duration_too_long"
  attempt_number:
    type: number
    required: true
    description: "重试次数"
  focus_characters:
    type: list
    required: false
    description: "重点角色"
  episode_duration:
    type: number
    required: false
    description: "目标时长（分钟）"
  plot_complexity:
    type: string
    required: false
    description: "情节复杂度"
  pacing:
    type: string
    required: false
    description: "节奏"

output_format: "JSON"
expected_fields:
  - episodes
