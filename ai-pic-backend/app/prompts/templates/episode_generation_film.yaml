name: episode_generation_film
description: "剧集生成提示词模板（电影模式）"
category: episode
version: "1.0"
author: "AI Video Studio"
created_at: "2026-01-08"
updated_at: "2026-01-08"

variables:
  story:
    type: dict
    required: true
    description: "故事信息对象"

  episode_count:
    type: number
    required: true
    description: "要生成的段落/分幕数量"
    min: 1
    max: 50

  episode_duration:
    type: number
    required: false
    description: "目标时长（分钟）"
    min: 5
    max: 240

  plot_complexity:
    type: string
    required: false
    description: "情节复杂度"
    default: "medium"
    enum: ["simple", "medium", "complex"]

  pacing:
    type: string
    required: false
    description: "节奏控制"
    default: "medium"
    enum: ["slow", "medium", "fast"]

  focus_characters:
    type: list
    required: false
    description: "重点角色列表"

  additional_requirements:
    type: string
    required: false
    description: "额外要求"
    max_length: 1000

  style_preferences:
    type: list
    required: false
    description: "风格偏好列表"

output_format: "JSON"
expected_fields:
  - episodes
