name: episode_from_outline_short_drama
description: "基于 Step Outline 输出单集 Episode Plan（短剧）"
category: episode
version: "1.0"
author: "AI Video Studio"
created_at: "2026-01-18"
updated_at: "2026-01-18"

variables:
  story:
    type: dict
    required: true
    description: "故事信息对象"
  outline:
    type: dict
    required: true
    description: "单集 Step Outline（含 logline，beats 可选）"
  previous_episodes:
    type: list
    required: false
    description: "已生成的前序集列表（episode_number/title/logline）"
  episode_duration:
    type: number
    required: false
    description: "目标时长（分钟）"
  plot_complexity:
    type: string
    required: false
    description: "情节复杂度 simple/medium/complex"
  pacing:
    type: string
    required: false
    description: "节奏 slow/medium/fast"
  additional_requirements:
    type: string
    required: false
    description: "额外要求"
  style_preferences:
    type: list
    required: false
    description: "风格偏好"

output_format: "JSON"
expected_fields:
  - episodes
