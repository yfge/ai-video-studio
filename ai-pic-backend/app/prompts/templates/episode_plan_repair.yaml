name: episode_plan_repair
description: "修复剧集规划输出为符合 EpisodePlanModel 的纯 JSON"
category: general
version: "1.0"
author: "AI Video Studio"
created_at: "2025-12-10"
updated_at: "2025-12-10"

variables:
  schema:
    type: any
    required: true
    description: "EpisodePlanModel 的 JSON Schema"
  missing_fields:
    type: list
    required: false
    description: "校验失败时缺失或异常的字段路径列表"
  original_prompt:
    type: string
    required: false
    description: "初次生成使用的提示词"
  original_output:
    type: string
    required: true
    description: "需要修复的原始模型输出"

usage_examples:
  - schema: "{...EpisodePlanModel schema...}"
    original_prompt: "生成 10 集都市职场剧集大纲"
    original_output: '{"episodes": []}'
