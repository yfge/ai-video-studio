name: storyboard_scene_grid_video_prompt
description: "宫格分镜图到 Seedance 连续成片的视频提示词 LLM 生成模板"
category: storyboard
version: "1.0"
author: "AI Video Studio"
created_at: "2026-06-11"
updated_at: "2026-06-11"

variables:
  story_tone:
    type: string
    required: false
    description: "故事基调摘要"
  style:
    type: string
    required: false
    description: "风格要求"
  scene:
    type: dict
    required: true
    description: "场景信息（scene_number/location/time/description）"
  characters:
    type: list
    required: false
    description: "出场角色设定列表（dict: name/appearance）"
  cells:
    type: list
    required: true
    description: "宫格镜头元数据（dict: panel_index/title/caption/duration）"
  total_duration:
    type: number
    required: true
    description: "目标总时长（秒）"
  aspect_ratio:
    type: string
    required: true
    description: "画幅比例"

usage_examples:
  - story_tone: "《醉拳》武侠短剧"
    scene:
      scene_number: 1
    cells:
      - panel_index: 1
        title: "醉步入场"
        caption: "醉步入场"
        duration: 1.0
    total_duration: 12
    aspect_ratio: "16:9"
