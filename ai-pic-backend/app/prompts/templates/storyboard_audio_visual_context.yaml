name: storyboard_audio_visual_context
description: "Audio timeline -> storyboard: inject story character card briefs + environment hint into visual-only description"
category: storyboard
version: "1.2"
author: "AI Video Studio"
created_at: "2026-01-30"
updated_at: "2026-05-25"

variables:
  base:
    type: string
    required: true
    description: "Base visual-only description fragment (e.g. spoken/action/pause template output)"
  character_cards:
    type: array
    required: false
    description: "List of short story character card briefs (appearance/clothing anchors)"
  environment:
    type: string
    required: false
    description: "Short environment hint (name/scene slug/location/time_of_day)"
