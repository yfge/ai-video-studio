name: virtual_ip_image_variant
description: "虚拟 IP 图生图变体提示词（直接用于图像模型）"
category: image
version: "1.0"
author: "AI Video Studio"
created_at: "2026-01-09"
updated_at: "2026-01-09"

variables:
  character_name:
    type: string
    required: true
    description: "角色名称"
    min_length: 1

  variant_prompt:
    type: string
    required: true
    description: "变体/变化指令（例如背面照、全身照、不同光线等）"
    min_length: 1

  character_description:
    type: string
    required: false
    description: "角色外观与设定描述（可选）"

  background_story:
    type: string
    required: false
    description: "背景故事（可选）"

  style:
    type: string
    required: false
    description: "风格（realistic/anime/cartoon/…）"
    default: "realistic"

  category:
    type: string
    required: false
    description: "图像类别（portrait/full_body/action/emotion/…）"
    default: "portrait"

  style_prompt:
    type: string
    required: false
    description: "风格补充提示词（可选）"

  base_prompt:
    type: string
    required: false
    description: "基础图像生成时的 prompt（可选）"

usage_examples:
  - character_name: "小雅"
    variant_prompt: "背面照，全身照，保持同一人物特征"
    character_description: "22岁女性，银色短发，精致五官，气质清冷，黑色高领毛衣"
    style: "realistic"
    category: "portrait"
