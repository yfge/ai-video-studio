name: virtual_ip_image
description: "虚拟 IP 图像生成提示词（直接用于图像模型）"
category: image
version: "1.2"
author: "AI Video Studio"
created_at: "2026-01-09"
updated_at: "2026-01-12"

variables:
  character_name:
    type: string
    required: true
    description: "角色名称"
    min_length: 1

  character_description:
    type: string
    required: false
    description: "角色外观与设定描述（可包含风格、服装、气质等）"

  background_story:
    type: string
    required: false
    description: "背景故事（可选）"

  style:
    type: string
    required: false
    description: "风格（realistic/anime/cartoon/portrait/…）"
    default: "realistic"

  category:
    type: string
    required: false
    description: "图像类别（portrait/full_body/action/emotion/…）"
    default: "portrait"

  style_prompt:
    type: string
    required: false
    description: "由 style_spec 派生的补充风格提示词（可选）"

  additional_prompts:
    type: list
    required: false
    description: "附加提示词列表（逗号分隔或数组输入后标准化）"

usage_examples:
  - character_name: "小雅"
    character_description: "22岁女性，银色短发，精致五官，气质清冷，黑色高领毛衣"
    style: "realistic"
    category: "portrait"
    additional_prompts: ["studio lighting", "depth of field"]
