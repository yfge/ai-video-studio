name: episode_from_outline
description: "基于已生成的 Step Outline，为单集输出完整 Episode Plan（logline 必填，beats 可选）"
category: episode
version: "1.0"
author: "AI Video Studio"
created_at: "2025-12-13"
updated_at: "2025-12-13"

variables:
  story:
    type: dict
    required: true
    description: "故事信息对象"
  outline:
    type: dict
    required: true
    description: "单集 Step Outline（含 logline，beats 可选）"
  previous_episodes:
    type: list
    required: false
    description: "已生成的前序集列表（episode_number/title/logline）"
  episode_duration:
    type: number
    required: false
    description: "目标时长（分钟）"
  plot_complexity:
    type: string
    required: false
    description: "情节复杂度 simple/medium/complex"
  pacing:
    type: string
    required: false
    description: "节奏 slow/medium/fast"
  additional_requirements:
    type: string
    required: false
    description: "额外要求"
  style_preferences:
    type: list
    required: false
    description: "风格偏好"

output_format: "JSON"
expected_fields:
  - episodes
    - episode_number
    - title
    - summary
    - plot_points
    - character_arcs
    - conflicts
    - scene_count
    - scenes

prompt: |
  你是该剧的分集主编，请基于提供的 Step Outline 生成这一集的完整 Episode Plan。若没有 beats，请基于 logline 和主故事冲突自行铺陈。

  ## 故事信息
  标题：{{ story.title }}
  类型：{{ story.genre }}
  {% if story.theme %}主题：{{ story.theme }}{% endif %}
  {% if story.synopsis %}概要：{{ story.synopsis }}{% endif %}
  {% if story.main_conflict %}总冲突：{{ story.main_conflict }}{% endif %}
  {% if story.resolution %}总收束/解法：{{ story.resolution }}{% endif %}

  ## 当前集的 Step Outline
  目标集数：{{ outline.episode_number }}
  集标题：{{ outline.title or '待定' }}
  Logline：{{ outline.logline or '无' }}
  Beats（如无可留空；若存在请保持顺序和节奏）：
  {% if outline.beats %}
  {% for beat in outline.beats %}
  - #{{ beat.sequence_number }} {{ beat.act_label or '' }} {{ beat.beat_title }}: {{ beat.beat_summary }}
    角色：{{ beat.characters_involved or [] }}；地点提示：{{ beat.location_hint or '待定' }}；预计时长：{{ beat.duration_estimate_minutes or '未知' }} 分钟
  {% endfor %}
  {% else %}
  - （本次未提供 beats，请基于 logline 合理拆分场景）
  {% endif %}

  ## 角色参考
  {% if story.main_characters -%}
  主要角色：
  {% for c in story.main_characters -%}
  - {{ c.name }}: {{ c.description or c.role }}
  {% endfor %}
  {% endif -%}
  {% if story.character_relationships %}角色关系：{{ story.character_relationships }}{% endif %}
  {% if story.main_conflict %}主冲突：{{ story.main_conflict }}{% endif %}
  {% if focus_characters %}重点角色：{{ focus_characters | map(attribute='name') | list | join(', ') }}{% endif %}

  ## 已生成的前序集（保持连贯）
  {% if previous_episodes and previous_episodes|length > 0 -%}
  {% for prev in previous_episodes %}
  - 第{{ prev.episode_number }}集：{{ prev.title or '' }} — {{ prev.logline or '无概述' }}
  {% endfor %}
  {% else %}
  - （无前序集）
  {% endif %}

  ## 生成要求
  - episode_number 必须等于 {{ outline.episode_number }}。
  - 输出 episodes 数组，仅包含这一集。
  - summary 150-300 字，覆盖 logline/主冲突；若有 beats 需兼顾。
  - plot_points/timing 覆盖故事结构；若有 beats 优先对齐；无 beats 时自行拆分。
  - conflicts 至少 1 条，明确冲突类型与强度；scene_count 与场景对应。
  - scenes 需包含 scene_number/slug_line/location/time_of_day/summary；若有 beats 尽量顺序对应；无 beats 时按合理节奏拆分。
  - 保持 {{ pacing }} 节奏与 {{ plot_complexity }} 复杂度。
  {% if episode_duration %}- **关键时长要求**：单集目标时长 {{ episode_duration }} 分钟（{{ episode_duration * 60 }} 秒）
  - 每个场景必须标注 estimated_duration_seconds（预估时长，单位秒）
  - 所有场景的 estimated_duration_seconds 之和应接近目标时长（允许±15%误差）
  - 时长分配建议：开场15-20%、中段60-70%、高潮和结尾15-25%

  **【重要】对白内容要求**：
  - 这是一个需要配音的剧本，必须生成丰富的对白内容！
  - 每分钟对白约需要 120-150 个汉字（语速正常）
  - {{ episode_duration }} 分钟剧本需要约 {{ (episode_duration * 135)|int }} 个汉字的对白
  - 每个场景必须包含多轮对话，不能只有描述性文字
  - 场景 summary 中必须包含完整的角色对白（用引号标注）
  - 对白应自然流畅，包含情感表达、反应、追问等
  - 避免使用"……"省略对白，必须写出完整台词

  **场景内容示例**：
  ❌ 错误（太简略）："老拐和阿盖儿在夜市吃东西，阿盖儿感到温暖。"
  ✅ 正确（对白丰富）："老拐点了一份烤串递给阿盖儿：'尝尝这个，我小时候最爱吃了。' 阿盖儿接过来咬了一口，眼睛亮了起来：'好香！这就是你说的人间烟火气？' 老拐笑了：'对，这种热闹劲儿，这种真实的味道，就是活着的感觉。' 阿盖儿环顾四周，看着忙碌的摊主、欢笑的食客：'我好像……能感受到他们的快乐。'"{% endif %}
  {% if style_preferences %}- 风格偏好：{{ style_preferences | join(', ') }}{% endif %}
  {% if additional_requirements %}- 额外要求：{{ additional_requirements }}{% endif %}

  ## 输出格式
  仅返回 JSON，符合 EpisodePlanModel，但 episodes 只能有 1 条：
  {
    "episodes": [
      {
        "episode_number": {{ outline.episode_number }},
        "title": "第{{ outline.episode_number }}集标题",
        "summary": "覆盖 logline 的概要",
        "plot_points": [{"description": "...", "timing": "开场"}],
        "character_arcs": {"主角": "本集发展"},
        "conflicts": [{"description": "...", "intensity": "medium"}],
        "scene_count": 6,
        "total_estimated_duration_seconds": {{ (episode_duration or 3) * 60 }},
        "scenes": [
          {
            "scene_number": 1,
            "slug_line": "INT. 地点 - TIME",
            "location": "主要地点",
            "time_of_day": "day",
            "summary": "角色A紧握方向盘，神色凝重。角色A：'撑住，我们快到了。' 角色B虚弱地靠着车窗：'外面……好亮……' 角色A看了一眼导航，猛踩油门：'代码解决不了的问题……这次，用最笨的办法。'（注意：summary必须包含丰富对白）",
            "estimated_duration_seconds": 36
          }
        ]
      }
    ]
  }
