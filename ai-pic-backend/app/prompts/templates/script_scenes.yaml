name: script_scenes
description: "剧本场景规划提示词模板"
category: script
version: "1.0"
author: "AI Video Studio"
created_at: "2025-12-10"
updated_at: "2025-12-10"

variables:
  story:
    type: dict
    required: true
    description: "故事信息（标题/类型/概要等）"

  episode:
    type: dict
    required: true
    description: "剧集信息（集数/标题等）"

  scene_detail_level:
    type: string
    required: false
    description: "场景细节程度"
    default: "medium"
    enum: ["minimal", "medium", "detailed", "cinematic"]

  format_type:
    type: string
    required: false
    description: "剧本格式"
    default: "screenplay"
    enum: ["screenplay", "teleplay", "stage", "audio", "animation"]

  language:
    type: string
    required: false
    description: "语言"
    default: "zh-CN"
    enum: ["zh-CN", "en-US", "ja-JP", "ko-KR"]

  style_preferences:
    type: list
    required: false
    description: "风格偏好列表"

  additional_requirements:
    type: string
    required: false
    description: "额外场景要求"

usage_examples:
  - story: {title: "未来之城", genre: "科幻"}
    episode: {episode_number: 1, title: "觉醒"}
    scene_detail_level: "medium"
    format_type: "screenplay"
    language: "zh-CN"
