name: storyboard_image_prompt
description: "分镜图像提示词组装模板"
category: storyboard
version: "1.3"
author: "AI Video Studio"
created_at: "2025-12-19"
updated_at: "2026-01-11"

variables:
  base_prompt:
    type: string
    required: true
    description: "基础提示词"
  reference_notes:
    type: list
    required: false
    description: "参考图像说明列表（dict: type/name）"

usage_examples:
  - base_prompt: "夜色中的仓库，景别: 中景"
    reference_notes:
      - type: "frame"
      - type: "character"
        name: "主角"
